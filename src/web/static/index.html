<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电商智能客服</title>
    <script src="/web/static.min.js"></script>
    <script src="/web/static.min.js"></script>
    <style>
        :root {
            --border-radius: 16px;
            --primary-color: #3b82f6;
            --background-color: #f8f7f6;
            --shadow-color: #00000056;
            --input-box-bg-color: #ffffffcb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Consolas", "微软雅黑", sans-serif;
        }

        body {
            min-height: 100vh;
            background-color: var(--background-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
        }

        #dialog-area {
            flex: 1;
            width: 100%;
            max-width: 900px;
            padding: 16px;
            display: flex;
            flex-direction: column;
        }

        .message-bubble {
            display: inline-flex;
            margin-bottom: 16px;
            padding: 12px;
            border-radius: var(--border-radius);
            font-size: 16px;
            line-height: 1.5;
            word-break: break-word;
            /* white-space: pre-wrap; */
        }

        .new-message {
            animation: messageAppear 0.3s ease;
        }

        @keyframes messageAppear {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        .user-message {
            background-color: var(--primary-color);
            align-self: flex-end;
            color: white;
            box-shadow: 0 2px 4px var(--shadow-color);
        }

        .bot-message {
            align-self: flex-start;
            color: black;
        }

        .input-box {
            width: 100%;
            max-width: 900px;
            padding: 16px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 8px var(--shadow-color);
            position: sticky;
            bottom: 16px;
            transition: all 0.3s ease;
            background-color: var(--input-box-bg-color);
            border: 2px solid transparent;

            &:hover {
                box-shadow: 0 4px 8px var(--primary-color);
            }

            &:focus-within {
                border: 2px solid var(--primary-color);
            }
        }

        #user-input {
            width: 100%;
            padding: 8px;
            font-size: 16px;
            max-height: 200px;
            overflow-y: auto;
            resize: none;
            border: none;
            outline: none;
            background-color: #ffffff00;
        }

        #send-btn {
            padding: 8px 16px;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-left: auto;
            display: block;
            background-color: var(--primary-color);

            &:hover {
                transform: translateY(-2px);
                box-shadow: 0 4px 8px var(--shadow-color);
            }

            &:active {
                transform: translateY(0);
            }

            &:disabled {
                background-color: #cccccc;
                cursor: not-allowed;
                transform: none !important;
                box-shadow: none !important;
            }
        }

        .loading-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .loader {
            width: 30px;
            height: 30px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .markdown-content {
            max-width: 100%;
            overflow-x: auto;
        }

        .markdown-content br {
            display: none;
        }

        .markdown-content h1,
        .markdown-content h2,
        .markdown-content h3 {
            margin: 1em 0 0.5em;
            color: var(--primary-color);
        }

        .markdown-content p {
            margin: 0.5em 0;
            line-height: 1.6;
        }

        .markdown-content ul,
        .markdown-content ol {
            margin: 0.5em 0;
            padding-left: 2em;
        }

        .markdown-content code {
            background-color: rgba(192, 192, 192, 0.2);
            padding: 0.2em 0.4em;
            border-radius: 4px;
            font-family: Consolas, monospace;
        }

        .markdown-content pre {
            background-color: #f6f8fa;
            padding: 1em;
            border-radius: var(--border-radius);
            overflow-x: auto;
            margin: 1em 0;
        }

        .markdown-content pre code {
            background: none;
            padding: 0;
        }
    </style>
</head>

<body>
    <div id="dialog-area">
        <div class="bot-message message-bubble">您好！我是电商智能客服，请问有什么需要我帮忙的？</div>
    </div>
    <div class="input-box">
        <textarea id="user-input" placeholder="需要我做什么？"></textarea>
        <button id="send-btn" onclick="sendMessage()">发送</button>
    </div>

    <script>
        const dialogArea = document.getElementById('dialog-area');
        const input = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const loadingBubble = createLoadingBubble();
        marked.setOptions({
            breaks: false,
            highlight: function (code) {
                return hljs.highlightAuto(code).value;
            }
        });

        // 发送消息
        async function sendMessage() {
            // 获取用户输入
            const message = input.value.trim();
            if (!message) return;
            // 禁用发送按钮
            sendBtn.disabled = true;
            // 发送消息
            addMessage(message, true);
            // 清空输入框并恢复高度
            input.value = '';
            input.style.height = 'auto';
            // 添加加载状态
            dialogArea.appendChild(loadingBubble);
            window.scrollTo(0, document.body.scrollHeight);
            // 获取回复
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                const data = await response.json();
                responseContent = data.message;
            } catch (error) {
                responseContent = '系统暂时无法响应，请稍后再试😥';
            }
            // 移除加载状态
            loadingBubble.remove();
            // 发送回复消息
            if (responseContent != null) {
                addMessage(responseContent, false);
            }
            // 启用发送按钮
            sendBtn.disabled = false;
        }

        // 自动调整输入框高度
        document.getElementById('user-input').addEventListener('input', () => {
            input.style.height = 'auto';
            input.style.height = Math.min(input.scrollHeight, 200) + 'px';
        });

        // 监听回车键
        document.getElementById('user-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // 创建加载状态的气泡
        function createLoadingBubble() {
            const bubble = document.createElement('div');
            bubble.classList.add('message-bubble', 'bot-message', 'new-message');
            const loadingContainer = document.createElement('div');
            loadingContainer.className = 'loading-container';
            const loader = document.createElement('div');
            loader.className = 'loader';
            loadingContainer.appendChild(loader);
            loadingContainer.appendChild(document.createTextNode('正在思索中...'));
            bubble.appendChild(loadingContainer);
            return bubble;
        }

        // 添加消息气泡
        function addMessage(content, isUser) {
            const bubble = document.createElement('div');
            // 设置气泡样式
            bubble.classList.add('message-bubble', isUser ? 'user-message' : 'bot-message', 'new-message');
            // 如果传入的是字符串则创建文本
            if (!isUser) {
                // 机器人回复转换为markdown格式
                const markdownContainer = document.createElement('div');
                markdownContainer.className = 'markdown-content';
                const dirty = marked.parse(content.toString());
                markdownContainer.innerHTML = DOMPurify.sanitize(dirty, {
                    ADD_TAGS: ["iframe"],
                    ADD_ATTR: ["allowfullscreen"]
                });
                bubble.appendChild(markdownContainer);
            } else {
                bubble.textContent = content;
            }
            // 添加气泡动态效果
            bubble.addEventListener('animationend', function handler() {
                this.classList.remove('new-message');
                this.removeEventListener('animationend', handler);
            });
            // 对话框添加气泡
            dialogArea.appendChild(bubble);
            window.scrollTo(0, document.body.scrollHeight);
        }

    </script>
</body>

</html>
